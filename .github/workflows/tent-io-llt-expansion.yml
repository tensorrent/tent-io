            ${TIE_FLAG} ${ADAPT_FLAG} ${EFF_FLAG} ${HYS_FLAG} ${HYS_UP_FLAG} ${STAB_FLAG} ${STAB_UP_FLAG} "${EXTRA_ARGS[@]}"

