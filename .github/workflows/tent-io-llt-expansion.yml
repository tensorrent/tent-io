name: Tent IO LLT Expansion

on:
  workflow_dispatch:
    inputs:
      profiles:
        description: "Expansion profiles or alias (auto_top2, auto_all, or comma list)"
        required: false
        default: "auto_top2"
        type: string
      query:
        description: "Pipeline query string"
        required: false
        default: "system profile check"
        type: string
      expansion_rank_by:
        description: "Sweep ranking metric: final_test_acc, mmlu_test_acc, or conversational_logic_test_acc."
        required: false
        default: "mmlu_test_acc"
        type: string
      run_auto_all_compare:
        description: "Also run auto_all and compare best-profile pointer"
        required: false
        default: false
        type: boolean
      min_best_final_test_acc:
        description: "Fail workflow if best_profile.final_test_acc is below this floor"
        required: false
        default: "0.20"
        type: string
      min_delta_vs_previous_best:
        description: "Optional fail floor on (current_best_acc - previous_best_acc). Example: -0.02 allows <=2pt drop; empty disables."
        required: false
        default: ""
        type: string
      promotion_history_keep_last:
        description: "Optional trim for pointer promotion history NDJSON; empty disables."
        required: false
        default: ""
        type: string
      promotion_summary_top_k:
        description: "Number of promotion leaderboard rows in step summary (default 3)."
        required: false
        default: "3"
        type: string
      promotion_summary_sort_by:
        description: "Promotion leaderboard sort key: promotions, avg_final_test_acc, or last_promoted_utc."
        required: false
        default: "promotions"
        type: string
      promotion_summary_history_window:
        description: "Optional recent-event window for promotion summary (0/all when empty)."
        required: false
        default: ""
        type: string
      split_gate_profile:
        description: "Split-gate preset: off, strict_split_profile_v1, or strict_split_profile_v1_conservative."
        required: false
        default: "off"
        type: string
      enable_external_eval:
        description: "Run non-blocking external-eval comparison lane for expand_s1 vs expand_s2."
        required: false
        default: true
        type: boolean
      allow_baseline_change:
        description: "Allow baseline profile change without failing baseline drift check."
        required: false
        default: false
        type: boolean
      enforce_promotion_decision_policy:
        description: "When true, skip pointer promotion unless promotion_decision.current.json allows it."
        required: false
        default: false
        type: boolean
      regression_min_delta_final_test_acc:
        description: "Fail when best final_test_acc delta vs previous is below this value."
        required: false
        default: "-0.01"
        type: string
      regression_min_delta_mmlu_test_acc:
        description: "Fail when best MMLU delta vs previous is below this value."
        required: false
        default: "-0.01"
        type: string
      regression_min_delta_conversational_test_acc:
        description: "Fail when best conversational delta vs previous is below this value."
        required: false
        default: "-0.02"
        type: string
      regression_max_delta_drift:
        description: "Fail when best drift increases above this delta."
        required: false
        default: "0.0"
        type: string
      promotion_alignment_required_runs:
        description: "Aligned internal/external winner runs required before promotion is allowed by decision policy."
        required: false
        default: "2"
        type: string
      promotion_min_internal_margin:
        description: "Minimum internal rank metric margin (best-vs-second) for promotion readiness."
        required: false
        default: "0.0"
        type: string
      promotion_min_external_vote_margin:
        description: "Minimum external winner vote margin for promotion readiness."
        required: false
        default: "0"
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: tent-io-llt-expansion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  expansion-sweep:
    name: Run LLT expansion sweep
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create legacy absolute-path compatibility symlink
        run: |
          sudo mkdir -p /Users/coo-koba42
          if [[ -e /Users/coo-koba42/dev || -L /Users/coo-koba42/dev ]]; then
            sudo rm -rf /Users/coo-koba42/dev
          fi
          sudo ln -s "$GITHUB_WORKSPACE" /Users/coo-koba42/dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Validate workflow numeric inputs
        run: |
          python3 - <<'PY'
          import json

          def parse_float(name: str, raw: str, allow_empty: bool = False) -> float | None:
              if raw == "" and allow_empty:
                  return None
              try:
                  return float(raw)
              except Exception as exc:
                  raise SystemExit(f"Invalid float for {name}: {raw!r}") from exc

          def parse_int(name: str, raw: str, allow_empty: bool = False, min_value: int | None = None) -> int | None:
              if raw == "" and allow_empty:
                  return None
              try:
                  value = int(raw)
              except Exception as exc:
                  raise SystemExit(f"Invalid int for {name}: {raw!r}") from exc
              if min_value is not None and value < min_value:
                  raise SystemExit(f"Invalid {name}: {value} < {min_value}")
              return value

          floor = parse_float("min_best_final_test_acc", "${{ inputs.min_best_final_test_acc }}")
          delta = parse_float("min_delta_vs_previous_best", "${{ inputs.min_delta_vs_previous_best }}", allow_empty=True)
          reg_final = parse_float("regression_min_delta_final_test_acc", "${{ inputs.regression_min_delta_final_test_acc }}")
          reg_mmlu = parse_float("regression_min_delta_mmlu_test_acc", "${{ inputs.regression_min_delta_mmlu_test_acc }}")
          reg_conv = parse_float("regression_min_delta_conversational_test_acc", "${{ inputs.regression_min_delta_conversational_test_acc }}")
          reg_drift = parse_float("regression_max_delta_drift", "${{ inputs.regression_max_delta_drift }}")
          align_runs = parse_int("promotion_alignment_required_runs", "${{ inputs.promotion_alignment_required_runs }}", min_value=1)
          promotion_internal_margin = parse_float("promotion_min_internal_margin", "${{ inputs.promotion_min_internal_margin }}")
          promotion_external_vote_margin = parse_int("promotion_min_external_vote_margin", "${{ inputs.promotion_min_external_vote_margin }}", min_value=0)
          keep_last = parse_int("promotion_history_keep_last", "${{ inputs.promotion_history_keep_last }}", allow_empty=True, min_value=1)
          top_k = parse_int("promotion_summary_top_k", "${{ inputs.promotion_summary_top_k }}", min_value=1)
          window = parse_int("promotion_summary_history_window", "${{ inputs.promotion_summary_history_window }}", allow_empty=True, min_value=0)
          sort_by = "${{ inputs.promotion_summary_sort_by }}"
          if sort_by not in {"promotions", "avg_final_test_acc", "last_promoted_utc"}:
              raise SystemExit(f"Invalid promotion_summary_sort_by: {sort_by!r}")
          split_gate_profile = "${{ inputs.split_gate_profile }}"
          if split_gate_profile not in {"off", "strict_split_profile_v1", "strict_split_profile_v1_conservative"}:
              raise SystemExit(f"Invalid split_gate_profile: {split_gate_profile!r}")
          rank_by = "${{ inputs.expansion_rank_by }}"
          if rank_by not in {"final_test_acc", "mmlu_test_acc", "conversational_logic_test_acc"}:
              raise SystemExit(f"Invalid expansion_rank_by: {rank_by!r}")
          profiles_raw = "${{ inputs.profiles }}".strip()
          if profiles_raw == "":
              raise SystemExit("Invalid profiles: empty input.")
          query = "${{ inputs.query }}".strip()
          if query == "":
              raise SystemExit("Invalid query: empty input.")

          print(
              json.dumps(
                  {
                      "status": "ok",
                      "min_best_final_test_acc": floor,
                      "min_delta_vs_previous_best": delta,
                      "regression_min_delta_final_test_acc": reg_final,
                      "regression_min_delta_mmlu_test_acc": reg_mmlu,
                      "regression_min_delta_conversational_test_acc": reg_conv,
                      "regression_max_delta_drift": reg_drift,
                      "promotion_alignment_required_runs": align_runs,
                      "promotion_min_internal_margin": promotion_internal_margin,
                      "promotion_min_external_vote_margin": promotion_external_vote_margin,
                      "promotion_history_keep_last": keep_last,
                      "promotion_summary_top_k": top_k,
                      "promotion_summary_history_window": window,
                      "promotion_summary_sort_by": sort_by,
                      "split_gate_profile": split_gate_profile,
                      "expansion_rank_by": rank_by,
                      "profiles": profiles_raw,
                      "query": query,
                  },
                  indent=2,
                  ensure_ascii=True,
              )
          )
          PY

      - name: Validate profile selection semantics
        run: |
          mkdir -p tent_io/harness/reports/expansion
          python3 tent_io/harness/run_llt_expansion_sweep.py \
            --profiles "${{ inputs.profiles }}" \
            --rank-by "${{ inputs.expansion_rank_by }}" \
            --validate-only \
            > tent_io/harness/reports/expansion/llt_expansion_profiles_resolved.expansion_sweep.current.json

      - name: Resolve split-gate profile (expansion-sweep)
        run: |
          profile="${{ inputs.split_gate_profile }}"
          case "$profile" in
            off)
              echo "RESOLVED_LLT_MIN_MMLU_TEST_ACC=-1" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_CONVERSATIONAL_TEST_ACC=-1" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_EVAL_MMLU_ACC=-1" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_EVAL_CONVERSATIONAL_ACC=-1" >> "$GITHUB_ENV"
              ;;
            strict_split_profile_v1)
              echo "RESOLVED_LLT_MIN_MMLU_TEST_ACC=0.215" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_CONVERSATIONAL_TEST_ACC=0.1384375" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_EVAL_MMLU_ACC=0.215" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_EVAL_CONVERSATIONAL_ACC=0.1384375" >> "$GITHUB_ENV"
              ;;
            strict_split_profile_v1_conservative)
              echo "RESOLVED_LLT_MIN_MMLU_TEST_ACC=0.205" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_CONVERSATIONAL_TEST_ACC=0.130" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_EVAL_MMLU_ACC=0.205" >> "$GITHUB_ENV"
              echo "RESOLVED_LLT_MIN_EVAL_CONVERSATIONAL_ACC=0.130" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown split_gate_profile: $profile" >&2
              exit 2
              ;;
          esac
          echo "RESOLVED_SPLIT_GATE_PROFILE=$profile" >> "$GITHUB_ENV"

      - name: Snapshot baseline pointer before sweep (expansion-sweep)
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          pointer = Path("tent_io/harness/reports/expansion/llt_expansion_best.current.json")
          out = Path("tent_io/harness/reports/expansion/llt_expansion_baseline_before_expansion.current.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          if pointer.exists():
              try:
                  payload = json.loads(pointer.read_text(encoding="utf-8"))
              except Exception:
                  payload = {"status": "invalid_pointer_json"}
          else:
              payload = {"status": "missing_pointer"}
          out.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          PY

      - name: Snapshot previous sweep summary (expansion-sweep)
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          current = Path("tent_io/harness/reports/expansion/llt_expansion_sweep.current.json")
          out = Path("tent_io/harness/reports/expansion/llt_expansion_previous.current.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          if current.exists():
              out.write_text(current.read_text(encoding="utf-8"), encoding="utf-8")
          else:
              out.write_text(json.dumps({"status": "missing_previous_summary"}, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          PY

      - name: Execute LLT expansion sweep
        run: |
          set +e
          python3 tent_io/harness/run_llt_expansion_sweep.py \
            --profiles "${{ inputs.profiles }}" \
            --rank-by "${{ inputs.expansion_rank_by }}" \
            --query "${{ inputs.query }}" \
            --llt-min-mmlu-test-acc "${RESOLVED_LLT_MIN_MMLU_TEST_ACC}" \
            --llt-min-conversational-test-acc "${RESOLVED_LLT_MIN_CONVERSATIONAL_TEST_ACC}" \
            --llt-min-eval-mmlu-acc "${RESOLVED_LLT_MIN_EVAL_MMLU_ACC}" \
            --llt-min-eval-conversational-acc "${RESOLVED_LLT_MIN_EVAL_CONVERSATIONAL_ACC}" \
            --best-pointer-out "tent_io/harness/reports/expansion/llt_expansion_best.candidate.json"
          rc=$?
          set -e
          if [[ $rc -ne 0 ]]; then
            echo "Expansion sweep failed with rc=$rc. Dumping summary JSON for diagnosis."
            if [[ -f tent_io/harness/reports/expansion/llt_expansion_sweep.current.json ]]; then
              python3 -c 'import json; from pathlib import Path; p = Path("tent_io/harness/reports/expansion/llt_expansion_sweep.current.json"); print(json.dumps(json.loads(p.read_text(encoding="utf-8")), indent=2, ensure_ascii=True))'
            fi
            for f in tent_io/harness/reports/expansion/full_stage_pipeline.*.json; do
              if [[ -f "$f" ]]; then
                echo "==== $f ===="
                python3 -c 'import json,sys; from pathlib import Path; p=Path(sys.argv[1]); print(json.dumps(json.loads(p.read_text(encoding="utf-8")), indent=2, ensure_ascii=True))' "$f"
              fi
            done
            exit $rc
          fi

      - name: Enforce best-profile accuracy floor
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          floor = float("${{ inputs.min_best_final_test_acc }}")
          summary_path = Path("tent_io/harness/reports/expansion/llt_expansion_sweep.current.json")
          if not summary_path.exists():
              raise SystemExit(f"Missing sweep summary: {summary_path}")
          payload = json.loads(summary_path.read_text(encoding="utf-8"))
          best = payload.get("best_profile") if isinstance(payload.get("best_profile"), dict) else {}
          best_acc = best.get("final_test_acc")
          if not isinstance(best_acc, (int, float)):
              raise SystemExit(f"Missing numeric best_profile.final_test_acc in {summary_path}")
          best_acc = float(best_acc)
          if best_acc < floor:
              raise SystemExit(
                  f"best_profile.final_test_acc below floor: {best_acc} < {floor} "
                  f"(profile={best.get('profile')})"
              )
          print(json.dumps({"status": "ok", "floor": floor, "best_final_test_acc": best_acc}, indent=2))
          PY

      - name: Enforce baseline immutability (expansion-sweep)
        run: |
          CMD=(
            python3 tent_io/harness/tools/check_baseline_drift.py
            --current "tent_io/harness/reports/expansion/llt_expansion_baseline_before_expansion.current.json"
            --challenger "tent_io/harness/reports/expansion/llt_expansion_best.candidate.json"
          )
          if [[ "${{ inputs.allow_baseline_change }}" == "true" ]]; then
            CMD+=(--allow-change)
          fi
          "${CMD[@]}"

      - name: Regression delta gate (expansion-sweep)
        run: |
          python3 tent_io/harness/tools/check_regression.py \
            --current "tent_io/harness/reports/expansion/llt_expansion_sweep.current.json" \
            --previous "tent_io/harness/reports/expansion/llt_expansion_previous.current.json" \
            --min-delta-final-test-acc "${{ inputs.regression_min_delta_final_test_acc }}" \
            --min-delta-mmlu-test-acc "${{ inputs.regression_min_delta_mmlu_test_acc }}" \
            --min-delta-conversational-test-acc "${{ inputs.regression_min_delta_conversational_test_acc }}" \
            --max-delta-drift "${{ inputs.regression_max_delta_drift }}"

      - name: Enforce optional delta-vs-previous guard
        if: ${{ inputs.min_delta_vs_previous_best != '' }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          min_delta = float("${{ inputs.min_delta_vs_previous_best }}")
          before_path = Path("tent_io/harness/reports/expansion/llt_expansion_baseline_before_expansion.current.json")
          summary_path = Path("tent_io/harness/reports/expansion/llt_expansion_sweep.current.json")

          def load_json(path: Path) -> dict:
              if not path.exists():
                  return {}
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
                  return payload if isinstance(payload, dict) else {}
              except Exception:
                  return {}

          before = load_json(before_path)
          before_best = before.get("best_profile") if isinstance(before.get("best_profile"), dict) else {}
          summary = load_json(summary_path)
          after_best = summary.get("best_profile") if isinstance(summary.get("best_profile"), dict) else {}
          before_acc = before_best.get("final_test_acc")
          after_acc = after_best.get("final_test_acc")

          if not isinstance(before_acc, (int, float)):
              print(json.dumps({"status": "skipped", "reason": "previous_best_missing"}, indent=2))
              raise SystemExit(0)
          if not isinstance(after_acc, (int, float)):
              raise SystemExit("Current best final_test_acc is missing/non-numeric.")

          delta = float(after_acc) - float(before_acc)
          if delta < min_delta:
              raise SystemExit(
                  f"Delta guard failed: {delta} < {min_delta} "
                  f"(before={before_acc}, after={after_acc}, profile={after_best.get('profile')})"
              )
          print(json.dumps({"status": "ok", "min_delta": min_delta, "delta": delta, "before": before_acc, "after": after_acc}, indent=2))
          PY

      - name: Snapshot previous external compare (expansion-sweep)
        if: ${{ inputs.enable_external_eval }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          current = Path("tent_io/harness/reports/expansion/external_eval_compare.current.json")
          previous = Path("tent_io/harness/reports/expansion/external_eval_compare.previous.json")
          previous.parent.mkdir(parents=True, exist_ok=True)
          if current.exists():
              previous.write_text(current.read_text(encoding="utf-8"), encoding="utf-8")
          else:
              previous.write_text(
                  json.dumps({"status": "missing_previous_external_compare"}, indent=2, ensure_ascii=True) + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Run external eval for expand_s1 and expand_s2 (expansion-sweep)
        if: ${{ inputs.enable_external_eval }}
        run: |
          export EXTERNAL_EVAL_RANK_BY="${{ inputs.expansion_rank_by }}"
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          base = Path("tent_io/harness/reports/expansion")
          base.mkdir(parents=True, exist_ok=True)
          runs = []
          rank_by = os.environ.get("EXTERNAL_EVAL_RANK_BY", "mmlu_test_acc")
          for profile in ("expand_s1", "expand_s2"):
              matches = sorted(base.glob(f"full_stage_pipeline.{profile}.*.json"), key=lambda p: p.stat().st_mtime, reverse=True)
              out = base / f"external_eval.{profile}.current.json"
              if not matches:
                  bootstrap_dir = base / "external_eval_profile_reports"
                  bootstrap_dir.mkdir(parents=True, exist_ok=True)
                  bootstrap_out = base / f"external_eval_bootstrap.{profile}.json"
                  bootstrap_md = base / f"external_eval_bootstrap.{profile}.md"
                  bootstrap_best = base / f"external_eval_bootstrap.{profile}.best.json"
                  bootstrap_history = base / f"external_eval_bootstrap.{profile}.history.ndjson"
                  bootstrap_cmd = [
                      "python3",
                      "tent_io/harness/run_llt_expansion_sweep.py",
                      "--profiles",
                      profile,
                      "--rank-by",
                      rank_by,
                      "--query",
                      f"external eval bootstrap {profile}",
                      "--llt-min-mmlu-test-acc",
                      "0.205",
                      "--llt-min-conversational-test-acc",
                      "0.130",
                      "--llt-min-eval-mmlu-acc",
                      "0.205",
                      "--llt-min-eval-conversational-acc",
                      "0.130",
                      "--out",
                      str(bootstrap_out),
                      "--summary-md-out",
                      str(bootstrap_md),
                      "--best-pointer-out",
                      str(bootstrap_best),
                      "--history-out",
                      str(bootstrap_history),
                      "--profile-reports-dir",
                      str(bootstrap_dir),
                  ]
                  boot = subprocess.run(bootstrap_cmd, capture_output=True, text=True)
                  if boot.returncode != 0:
                      payload = {
                          "status": "skipped",
                          "reason": "bootstrap_profile_run_failed",
                          "profile": profile,
                          "pipeline_report": None,
                          "bootstrap_rc": boot.returncode,
                          "bootstrap_stdout_tail": boot.stdout[-500:],
                          "bootstrap_stderr_tail": boot.stderr[-500:],
                      }
                      out.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
                      runs.append(payload)
                      continue
                  matches = sorted(bootstrap_dir.glob(f"full_stage_pipeline.{profile}.*.json"), key=lambda p: p.stat().st_mtime, reverse=True)
                  if not matches:
                      payload = {
                          "status": "skipped",
                          "reason": "bootstrap_profile_report_missing",
                          "profile": profile,
                          "pipeline_report": None,
                      }
                      out.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
                      runs.append(payload)
                      continue
              report_path = matches[0]
              cmd = [
                  "python3",
                  "tent_io/harness/run_external_eval.py",
                  "--profile",
                  profile,
                  "--pipeline-report",
                  str(report_path),
                  "--out",
                  str(out),
              ]
              proc = subprocess.run(cmd, capture_output=True, text=True)
              runs.append(
                  {
                      "profile": profile,
                      "pipeline_report": str(report_path),
                      "out": str(out),
                      "rc": proc.returncode,
                      "stdout_tail": proc.stdout[-500:],
                      "stderr_tail": proc.stderr[-500:],
                  }
              )
              if proc.returncode != 0:
                  raise SystemExit(f"External eval failed for {profile}: rc={proc.returncode}")
          summary = base / "external_eval_pair_run.current.json"
          summary.write_text(json.dumps({"status": "ok", "runs": runs}, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          PY

      - name: Compare external eval pair (non-blocking)
        if: ${{ inputs.enable_external_eval }}
        run: |
          python3 tent_io/harness/tools/check_external_regression.py \
            --s1 "tent_io/harness/reports/expansion/external_eval.expand_s1.current.json" \
            --s2 "tent_io/harness/reports/expansion/external_eval.expand_s2.current.json" \
            --previous "tent_io/harness/reports/expansion/external_eval_compare.previous.json" \
            --out "tent_io/harness/reports/expansion/external_eval_compare.current.json"

      - name: Compute promotion decision state (non-blocking)
        if: ${{ inputs.enable_external_eval }}
        run: |
          python3 tent_io/harness/tools/compute_promotion_decision.py \
            --internal-summary "tent_io/harness/reports/expansion/llt_expansion_sweep.current.json" \
            --external-compare "tent_io/harness/reports/expansion/external_eval_compare.current.json" \
            --out "tent_io/harness/reports/expansion/promotion_decision.current.json" \
            --history-out "tent_io/harness/reports/expansion/promotion_decision.history.ndjson" \
            --alignment-required-runs "${{ inputs.promotion_alignment_required_runs }}" \
            --min-internal-margin "${{ inputs.promotion_min_internal_margin }}" \
            --min-external-vote-margin "${{ inputs.promotion_min_external_vote_margin }}"

      - name: Summarize promotion decision trend (non-blocking)
        if: ${{ inputs.enable_external_eval }}
        run: |
