      - name: Write expansion sweep step summary
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("tent_io/harness/reports/expansion/llt_expansion_sweep.current.json")
          before_path = Path("tent_io/harness/reports/expansion/llt_expansion_baseline_before_expansion.current.json")
          if not summary_path.exists():
              raise SystemExit(f"Missing sweep summary: {summary_path}")
          payload = json.loads(summary_path.read_text(encoding="utf-8"))

          best = payload.get("best_profile") if isinstance(payload.get("best_profile"), dict) else {}
          trend = payload.get("trend") if isinstance(payload.get("trend"), dict) else {}
          floor = float("${{ env.INPUTS_MIN_BEST_FINAL_TEST_ACC }}")
          delta_input = "${{ env.INPUTS_MIN_DELTA_VS_PREVIOUS_BEST }}"

          best_acc = best.get("final_test_acc")
          floor_passes = isinstance(best_acc, (int, float)) and float(best_acc) >= floor

          before_best_acc = None
          delta_vs_previous = None
          delta_guard_passes = None
          if before_path.exists():
              try:
                  before_payload = json.loads(before_path.read_text(encoding="utf-8"))
                  before_best = before_payload.get("best_profile") if isinstance(before_payload.get("best_profile"), dict) else {}
                  raw_before_acc = before_best.get("final_test_acc")
                  if isinstance(raw_before_acc, (int, float)):
                      before_best_acc = float(raw_before_acc)
              except Exception:
                  before_best_acc = None
          if isinstance(best_acc, (int, float)) and isinstance(before_best_acc, float):
              delta_vs_previous = float(best_acc) - before_best_acc
          if delta_input != "":
              min_delta = float(delta_input)
              if isinstance(delta_vs_previous, float):
                  delta_guard_passes = delta_vs_previous >= min_delta
          floor_status = "PASS" if floor_passes else "FAIL"
          if delta_input == "":
              delta_status = "SKIP"
          elif isinstance(delta_guard_passes, bool):
              delta_status = "PASS" if delta_guard_passes else "FAIL"
          else:
              delta_status = "SKIP"
          floor_badge = f"[{floor_status}]"
          delta_badge = f"[{delta_status}]"

          lines = [
              "## LLT Expansion Sweep",
              "",
              f"- Status: **{payload.get('status')}**",
              f"- Profiles: `{','.join(payload.get('profiles', [])) if isinstance(payload.get('profiles'), list) else payload.get('profiles')}`",
              f"- Best profile: `{best.get('profile')}`",
              f"- rank_by: `{payload.get('rank_by')}`",
              f"- Best rank_metric_value: `{best.get('rank_metric_value')}`",
              f"- Best final_test_acc: `{best.get('final_test_acc')}`",
              f"- Best replay_test_acc: `{best.get('replay_test_acc')}`",
              f"- Best train_eval_drift: `{best.get('train_eval_drift')}`",
              f"- Trend sparkline: `{trend.get('sparkline_ascii')}`",
              f"- Trend window: `{trend.get('window')}`",
              f"- Trend points: `{trend.get('points')}`",
              f"- split_gate_profile: `{os.environ.get('RESOLVED_SPLIT_GATE_PROFILE')}`",
              (
                  "- split_gate_thresholds: "
                  f"`train_mmlu={os.environ.get('RESOLVED_LLT_MIN_MMLU_TEST_ACC')}, "
                  f"train_conv={os.environ.get('RESOLVED_LLT_MIN_CONVERSATIONAL_TEST_ACC')}, "
                  f"eval_mmlu={os.environ.get('RESOLVED_LLT_MIN_EVAL_MMLU_ACC')}, "
                  f"eval_conv={os.environ.get('RESOLVED_LLT_MIN_EVAL_CONVERSATIONAL_ACC')}`"
              ),
              "",
              f"- Profiles resolved artifact: `tent_io/harness/reports/expansion/llt_expansion_profiles_resolved.expansion_sweep.current.json`",
              "",
              "### Guard Status",
              f"- min_best_final_test_acc: `{floor}`",
              f"- floor_passes: `{floor_passes}`",
              f"- floor_status: **{floor_status}** {floor_badge}",
              f"- min_delta_vs_previous_best: `{delta_input if delta_input != '' else 'disabled'}`",
              f"- previous_best_final_test_acc: `{before_best_acc}`",
              f"- delta_vs_previous_best: `{delta_vs_previous}`",
              f"- delta_guard_passes: `{delta_guard_passes}`",
              f"- delta_guard_status: **{delta_status}** {delta_badge}",
              "- regression_thresholds: "
              f"`final=${{ env.INPUTS_REGRESSION_MIN_DELTA_FINAL_TEST_ACC }}, "
              f"mmlu=${{ env.INPUTS_REGRESSION_MIN_DELTA_MMLU_TEST_ACC }}, "
              f"conv=${{ env.INPUTS_REGRESSION_MIN_DELTA_CONVERSATIONAL_TEST_ACC }}, "
              f"drift=${{ env.INPUTS_REGRESSION_MAX_DELTA_DRIFT }}`",
              f"- allow_baseline_change: `${{ env.INPUTS_ALLOW_BASELINE_CHANGE }}`",
              f"- enforce_promotion_decision_policy: `${{ env.INPUTS_ENFORCE_PROMOTION_DECISION_POLICY }}`",
              f"- enforce_intelligence_promotion_advisory: `${{ env.INPUTS_ENFORCE_INTELLIGENCE_PROMOTION_ADVISORY }}`",
              "",
              f"Artifacts: `{summary_path}`, `tent_io/harness/reports/expansion/llt_expansion_sweep.current.md`",
          ]

          gh_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if gh_summary:
              with open(gh_summary, "a", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")
          print("\n".join(lines))
          PY

