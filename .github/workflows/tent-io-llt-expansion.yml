      - name: Promote candidate pointer to current
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          candidate = Path("tent_io/harness/reports/expansion/llt_expansion_best.candidate.json")
          current = Path("tent_io/harness/reports/expansion/llt_expansion_best.current.json")
          audit = Path("tent_io/harness/reports/expansion/llt_expansion_pointer_promotion.expansion_sweep.current.json")
          audit_history = Path("tent_io/harness/reports/expansion/llt_expansion_pointer_promotion_history.ndjson")
          decision = Path("tent_io/harness/reports/expansion/promotion_decision.current.json")
          advisory = Path("tent_io/harness/reports/expansion/intelligence_promotion_advisory.current.json")
          enforce_policy = "${{ env.INPUTS_ENFORCE_PROMOTION_DECISION_POLICY }}" == "true"
          enforce_advisory = "${{ env.INPUTS_ENFORCE_INTELLIGENCE_PROMOTION_ADVISORY }}" == "true"
          external_enabled = "${{ env.INPUTS_ENABLE_EXTERNAL_EVAL }}" == "true"

          def load_json(path: Path) -> dict:
              if not path.exists():
                  return {}
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
                  return payload if isinstance(payload, dict) else {}
              except Exception:
                  return {}

          if not candidate.exists():
              raise SystemExit(f"Missing candidate pointer: {candidate}")
          if enforce_policy and external_enabled:
              decision_payload = load_json(decision)
              promotion_allowed = decision_payload.get("promotion_allowed") is True
              if not promotion_allowed:
                  payload = {
                      "timestamp_utc": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
                      "status": "skipped",
                      "reason": "promotion_decision_blocked",
                      "job": "expansion-sweep",
                      "decision_path": str(decision),
                      "decision_state": decision_payload.get("decision_state"),
                      "promotion_allowed": decision_payload.get("promotion_allowed"),
                      "promoted_from": str(candidate),
                      "promoted_to": str(current),
                  }
                  audit.parent.mkdir(parents=True, exist_ok=True)
                  audit.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
                  with audit_history.open("a", encoding="utf-8") as f:
                      f.write(json.dumps(payload, ensure_ascii=True) + "\n")
                  print(json.dumps(payload, indent=2, ensure_ascii=True))
                  raise SystemExit(0)
          if enforce_advisory and external_enabled:
              advisory_payload = load_json(advisory)
              advisory_state = advisory_payload.get("advisory_state")
              if advisory_state != "promote_candidate":
                  payload = {
                      "timestamp_utc": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
                      "status": "skipped",
                      "reason": "intelligence_advisory_blocked",
                      "job": "expansion-sweep",
                      "advisory_path": str(advisory),
                      "advisory_state": advisory_state,
                      "promoted_from": str(candidate),
                      "promoted_to": str(current),
                  }
                  audit.parent.mkdir(parents=True, exist_ok=True)
                  audit.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
                  with audit_history.open("a", encoding="utf-8") as f:
                      f.write(json.dumps(payload, ensure_ascii=True) + "\n")
                  print(json.dumps(payload, indent=2, ensure_ascii=True))
                  raise SystemExit(0)
          before = load_json(current)
          after = load_json(candidate)
          current.parent.mkdir(parents=True, exist_ok=True)
          current.write_text(candidate.read_text(encoding="utf-8"), encoding="utf-8")
          before_best = before.get("best_profile") if isinstance(before.get("best_profile"), dict) else {}
          after_best = after.get("best_profile") if isinstance(after.get("best_profile"), dict) else {}
          payload = {
              "timestamp_utc": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "status": "ok",
              "job": "expansion-sweep",
              "promoted_from": str(candidate),
              "promoted_to": str(current),
              "before_profile": before_best.get("profile"),
              "after_profile": after_best.get("profile"),
              "before_final_test_acc": before_best.get("final_test_acc"),
              "after_final_test_acc": after_best.get("final_test_acc"),
              "changed": before_best.get("profile") != after_best.get("profile"),
          }
          audit.parent.mkdir(parents=True, exist_ok=True)
          audit.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          with audit_history.open("a", encoding="utf-8") as f:
              f.write(json.dumps(payload, ensure_ascii=True) + "\n")
          print(
              json.dumps(
                  {
                      "status": "ok",
                      "promoted_from": str(candidate),
                      "promoted_to": str(current),
                      "audit": str(audit),
                      "audit_history": str(audit_history),
                  },
                  indent=2,
              )
          )
          PY

