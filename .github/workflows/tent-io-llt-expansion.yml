                      f"- intelligence_regression_failures: `{reg.get('failures')}`",
                  ]
              )
          else:
              lines.append("- intelligence_regression: `missing`")
          if regression_trend_path.exists():
              tr = json.loads(regression_trend_path.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      f"- intelligence_regression_trend_status: `{tr.get('status')}`",
