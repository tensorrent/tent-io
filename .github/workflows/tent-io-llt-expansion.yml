              )
          else:
              lines.append("- decision_trend: `missing`")
          if scoring_path.exists():
              score = json.loads(scoring_path.read_text(encoding="utf-8"))
              metrics = score.get("scores") if isinstance(score.get("scores"), dict) else {}
              lines.extend(
                  [
                      f"- ml_intelligence_score: `{metrics.get('ml_intelligence_score')}`",
                      f"- logic_chain_score: `{metrics.get('logic_chain_score')}`",
                      f"- ai_intelligence_score: `{metrics.get('ai_intelligence_score')}`",
                      f"- agi_readiness_score: `{metrics.get('agi_readiness_score')}`",
                  ]
              )
          else:
              lines.append("- intelligence_scoring: `missing`")
          if regression_path.exists():
              reg = json.loads(regression_path.read_text(encoding="utf-8"))
