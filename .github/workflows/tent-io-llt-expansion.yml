      - name: Promotion proposal — read flag
        id: promotion_proposal_flag
        if: ${{ success() && hashFiles('promotion_proposal.flag') != '' }}
        run: |
          echo "state=$(cat promotion_proposal.flag)" >> "$GITHUB_OUTPUT"

      - name: Promotion proposal — PR two-run confirmation
        id: proposal_pr_two_run
        if: ${{ success() && github.event_name == 'pull_request' && hashFiles('promotion_proposal.flag') != '' }}
        run: |
          set -euo pipefail
          state=$(cat promotion_proposal.flag)
          confirmed=false
          # Suffix streak of TRIGGERED lines (resets on NOT_TRIGGERED or blank); require >= 2 at EOF.
          streak=0
          if [[ -f promotion_proposal.history ]]; then
            streak=$(awk 'BEGIN{c=0} {gsub(/\r/,""); if ($0=="TRIGGERED") c++; else c=0} END{print c+0}' promotion_proposal.history)
          fi
          echo "triggered_suffix_streak=$streak" >> "$GITHUB_OUTPUT"
          if [[ "$state" == "TRIGGERED" && "$streak" -ge 2 ]]; then
            confirmed=true
          fi
          echo "confirmed=$confirmed" >> "$GITHUB_OUTPUT"
          stability_raw="_"
          class_raw="_"
          if [[ -f tent_io/harness/reports/expansion/promotion_decision.current.json ]]; then
            read -r stability_raw class_raw < <(python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path("tent_io/harness/reports/expansion/promotion_decision.current.json")
          st = "_"
          cl = "_"
          try:
              d = json.loads(p.read_text(encoding="utf-8"))
              stv = d.get("tie_break_stability_score")
              if isinstance(stv, (int, float)):
                  st = f"{float(stv):0.3f}"
              cl = str(d.get("tie_break_trajectory_dynamical_class", "_"))
          except Exception:
              pass
          print(st, cl)
          PY
            )
          fi
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            gate_label="not passed"
            if [[ "$confirmed" == true ]]; then
              gate_label="passed"
            fi
            req_streak=2
            num_disp=$streak
            if [[ "$num_disp" -gt "$req_streak" ]]; then
              num_disp=$req_streak
            fi
            if [[ "$confirmed" == true ]]; then
              status_line="- **Status:** 🟢 CONFIRMED (${num_disp}/${req_streak})"
            elif [[ "$state" == "TRIGGERED" ]]; then
              status_line="- **Status:** 🟡 BUILDING (${num_disp}/${req_streak})"
            else
              status_line="- **Status:** 🔴 NOT TRIGGERED"
            fi
            {
              echo ""
              echo "## PR promotion confirmation (advisory)"
              echo ""
              echo "$status_line"
              echo "- **Suffix streak (TRIGGERED at EOF):** ${streak} (required ≥ 2 for optional PR comment)"
              echo "- **This-run flag:** ${state}"
              echo "- **Stability:** ${stability_raw} | **Class:** ${class_raw}"
              echo "- **PR comment gate:** ${gate_label}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Apply promotion labels (PR)
        if: ${{ success() && github.event_name == 'pull_request' && steps.proposal_pr_two_run.outcome == 'success' }}
        uses: actions/github-script@v7
        env:
          PR_CONFIRMED: ${{ steps.proposal_pr_two_run.outputs.confirmed }}
          PR_FLAG_STATE: ${{ steps.promotion_proposal_flag.outputs.state }}
        with:
          script: |
            const issue_number = context.payload.pull_request?.number ?? context.issue?.number;
            if (!issue_number) {
              console.log("No PR number; skipping labels.");
              return;
            }
            const confirmed = process.env.PR_CONFIRMED === "true";
            const flagState = process.env.PR_FLAG_STATE || "";
            const building = flagState === "TRIGGERED";
            const fs = require("fs");
            let trajectoryClass = null;
            let stabilityScore = null;
            try {
              const raw = fs.readFileSync("tent_io/harness/reports/expansion/promotion_decision.current.json", "utf8");
              const dec = JSON.parse(raw);
              trajectoryClass = dec?.tie_break_trajectory_dynamical_class ?? null;
              const s = dec?.tie_break_stability_score;
              if (typeof s === "number") stabilityScore = s;
            } catch (e) {
              // Missing or unreadable decision artifact keeps unstable=false by default.
            }
            const unstable =
              trajectoryClass === "oscillating_boundary" ||
              trajectoryClass === "large_swing_instability" ||
              (typeof stabilityScore === "number" && stabilityScore < 0.4);

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = new Set(labels.map((l) => l.name));

            async function addLabel(name) {
              if (existing.has(name)) return;
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: [name],
              });
              existing.add(name);
            }

            async function removeLabel(name) {
              if (!existing.has(name)) return;
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                name: name,
              });
              existing.delete(name);
            }

            const READY = "promotion:ready";
            const BUILDING = "promotion:building";
            const UNSTABLE = "promotion:unstable";

            if (confirmed) {
              await addLabel(READY);
              await removeLabel(BUILDING);
              await removeLabel(UNSTABLE);
            } else if (building) {
              await addLabel(BUILDING);
              await removeLabel(READY);
              await removeLabel(UNSTABLE);
            } else if (unstable) {
              await addLabel(UNSTABLE);
              await removeLabel(READY);
              await removeLabel(BUILDING);
            } else {
              await removeLabel(READY);
              await removeLabel(BUILDING);
              await removeLabel(UNSTABLE);
            }

      - name: Promotion proposal comment
        if: ${{ success() && github.event_name == 'pull_request' && steps.promotion_proposal_flag.outputs.state == 'TRIGGERED' && steps.proposal_pr_two_run.outputs.confirmed == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const n = context.payload.pull_request?.number ?? context.issue?.number;
            if (!n) {
              console.log("No pull request number; skipping comment.");
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: n,
              body: "🚀 **Promotion proposal triggered** (advisory, two consecutive runs)\n\nThis PR has two back-to-back advisory proposal signals on this branch. See the latest workflow run summary for readiness, stability, and candidate details. This does not change baseline or override policy gates.",
            });

